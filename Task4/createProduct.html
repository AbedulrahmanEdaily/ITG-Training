<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Product</title>

    <link rel="stylesheet" href="src/css/createProduct.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <header>
        <div class="container">
            <h1>Create Product</h1>
            <a href="index.html" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i>
                Back To Products
            </a>
        </div>
    </header>
    <main>
        <div class="container">
            <form id="createProductForm">
                <div class="image-preview">
                    <img id="previewImage" src="https://placehold.co/500x300" alt="Preview">
                </div>
                <div class="fields">
                    <div class="field">
                        <label>Product Name</label>
                        <input type="text" id="name" name="name">
                    </div>
                    <div class="field">
                        <label for="image">Product Image</label>
                        <input type="url" id="image" name="image">
                    </div>
                    <div class="row">
                        <div class="field">
                            <label>Category</label>
                            <select id="category" name="category">
                                <option value="electronics">
                                    Electronics
                                </option>
                                <option value="clothing">
                                    Clothing
                                </option>
                                <option value="accessories">
                                    Accessories
                                </option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Color</label>
                            <select id="color" name="color">
                                <option value="black">Black</option>
                                <option value="blue">Blue</option>
                                <option value="green">Green</option>
                                <option value="red">Red</option>
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="field">
                            <label>Rating</label>
                            <input type="number" id="rating" min="0.5" max="5" step="0.5" name="rating">
                        </div>
                        <div class="field">
                            <label>Price</label>
                            <input type="number" id="price" min="0" step="0.01" name="price">
                        </div>
                    </div>
                    <div class="field">
                        <label>Discount ($)</label>
                        <input type="number" id="discount" min="0" value="0" step="0.01" name="discount">
                    </div>
                    <div class="field">
                        <label>Description</label>
                        <textarea id="description" rows="5" name="description"></textarea>
                    </div>
                    <button class="submit-btn">
                        <i class="fa-solid fa-plus"></i>
                        Create Product
                    </button>
                </div>
            </form>
        </div>
    </main>
    <script type="module" src="src/js/createProduct.js"></script>
</body>

</html>
