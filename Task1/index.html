    <link rel="stylesheet" href="style.css" />
    <title>LUGX Store</title>

<body>

    <main>

        <!-- Section 1 -->

            <section class="img-container container">
                <div class="image">
                    <img loading="lazy" src="img/lance-asper-Wl6OeSGyOf4-unsplash.jpg" alt="car photo">

                <div class="image">
                    <img loading="lazy" src="img/sem-ramon-RxYtIyEWBX0-unsplash.jpg" alt="car photo">
                </div>
            </section>
        </section>
        <!--End Section 1 -->
        
        <!-- Section 2 -->
        <section class="section-2">
            <header class="page-header">
                <h1>Explore Every Detail</h1>
                <p>From every curve to every feature, explore what makes this car built to stand out.</p>
            </header>
            <section class="img-container2 container">
                <div class="image2 image-main">
                    <img src="img/lance-asper-Wl6OeSGyOf4-unsplash.jpg" alt="car photo">

                <div class="image2">
                    <img src="img/lucas-degenhardt-gcihFCZWVwo-unsplash.jpg" alt="car photo">

                <div class="image2">
                    <img src="img/martin-katler-uPrFF1Qat2s-unsplash.jpg" alt="car photo">
                </div>
                <div class="image2">
                    <img src="img/sanjai-sudheesh-NsTl86tRpUI-unsplash.jpg" alt="car photo">
                </div>
                <div class="image2">
                    <img src="img/sem-ramon-RxYtIyEWBX0-unsplash.jpg" alt="car photo">
                </div>
            </section>
        </section>
        <!-- End Section 2 -->
